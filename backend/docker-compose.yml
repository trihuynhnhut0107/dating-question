version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dating-question-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dating_question
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: dating-question-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=dating_question
      - DB_PORT=5432
      - GIN_MODE=debug
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  postgres_data:
